name: Nutrivio
options:
  bundleIdPrefix: com.prometheo
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.2"
settings:
  SWIFT_VERSION: "5.9"
targets:
  Nutrivio:
    type: application
    platform: iOS
    sources:
      - path: App
        excludes:
          - "**/.DS_Store"
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.prometheo.nutrivio
      INFOPLIST_FILE: App/Info.plist
      DEVELOPMENT_TEAM: ""
      CODE_SIGN_IDENTITY: "-"
      CODE_SIGN_STYLE: Automatic
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: App/Nutrivio.entitlements
